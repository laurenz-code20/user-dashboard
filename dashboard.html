<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard | Faculty Helpdesk</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex">

<!-- SIDEBAR -->
<aside class="w-64 bg-[#1e3a8a] text-white flex flex-col">

    <div class="p-6 text-2xl font-bold border-b border-blue-800">
        MIS Helpdesk
    </div>

    <nav class="flex-1 p-4 space-y-3">

        <a href="dashboard.html" class="block bg-blue-700 p-3 rounded-lg">
            🏠 Dashboard
        </a>

        <a href="submit-ticket.html" class="block hover:bg-blue-700 p-3 rounded-lg transition">
            ➕ Submit Ticket
        </a>

        <a href="my-tickets.html" class="block hover:bg-blue-700 p-3 rounded-lg transition">
            🎫 My Tickets
        </a>

        <a href="notifications.html" class="block hover:bg-blue-700 p-3 rounded-lg transition">
            🔔 Notifications
        </a>

        <a href="knowledge-base.html" class="block hover:bg-blue-700 p-3 rounded-lg transition">
            📚 Knowledge Base
        </a>

    </nav>

    <div class="p-4 border-t border-blue-800">
        <button class="w-full bg-red-500 hover:bg-red-600 p-2 rounded-lg">
            Logout
        </button>
    </div>

</aside>

<!-- MAIN CONTENT -->
<main class="flex-1 p-8">

    <h1 class="text-3xl font-bold text-gray-800 mb-8">
        Welcome, Faculty Member 👋
    </h1>

    <!-- Summary Cards -->
    <div class="grid grid-cols-4 gap-6 mb-10">

        <div class="bg-white p-6 rounded-2xl shadow-lg hover:shadow-xl transition">
            <h3 class="text-gray-500">Open</h3>
            <p class="text-4xl font-bold text-yellow-500">2</p>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-lg hover:shadow-xl transition">
            <h3 class="text-gray-500">In Progress</h3>
            <p class="text-4xl font-bold text-blue-600">1</p>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-lg hover:shadow-xl transition">
            <h3 class="text-gray-500">Resolved</h3>
            <p class="text-4xl font-bold text-green-600">5</p>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-lg hover:shadow-xl transition">
            <h3 class="text-gray-500">Urgent</h3>
            <p class="text-4xl font-bold text-red-600">0</p>
        </div>

    </div>

    <!-- Recent Activity -->
    <div class="bg-white rounded-2xl shadow-lg p-6">

        <h2 class="text-xl font-semibold mb-4 text-gray-700">
            Recent Activity
        </h2>

        <ul class="space-y-3 text-gray-600">
            <li>✔ Ticket #1023 is now In Progress</li>
            <li>✔ Ticket #1019 has been Resolved</li>
            <li>✔ New update from MIS Staff</li>
        </ul>

    </div>

</main>

</body>
</html>
